name: ${COMPOSE_PROJECT_NAME:-seo-local-marketplace}

services:
  db:
    image: postgres:16-alpine
    container_name: seo-local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seo_local}
      POSTGRES_USER: ${POSTGRES_USER:-seo_local}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seo_local_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seo_local} -d ${POSTGRES_DB:-seo_local}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - seo_local_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo-local-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-seo_local}
      DB_USER: ${POSTGRES_USER:-seo_local}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-seo_local_dev_password}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - seo_local_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: seo-local-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:${API_HOST_PORT:-4000}/api/v1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - seo_local_network

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: seo-local-pgadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@seolocalmarketplace.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-seo_local_pgadmin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_LISTEN_ADDRESS: "0.0.0.0"
      PGADMIN_LISTEN_PORT: "80"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - seo_local_network

volumes:
  postgres_data:
    name: seo-local-postgres-data
  pgadmin_data:
    name: seo-local-pgadmin-data

networks:
  seo_local_network:
    name: seo-local-network
    driver: bridge
